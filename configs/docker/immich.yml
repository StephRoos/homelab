# ============================================================================
# IMMICH - Official architecture (server + web merged since v1.124)
# ============================================================================
# A single immich-server serves both the API and the web frontend on port 2283.
#
# This replaces the previous setup that relied on:
#   - a separate immich-web container, and
#   - an undocumented immich-api-proxy (nginx, host network) whose
#     proxy_pass to localhost:3001 was broken (502), because the socat listener
#     lived inside the immich-server container (bridge network), not on the host.
#
# No socat entrypoint, no extra proxy: the merged server handles everything.
#
# Volumes preserved from the previous deployment (do not change without backup):
#   /mnt/nas/immich/library  -> uploaded media
#   /mnt/nas/immich/postgres -> database (Postgres 16 + vchord/pgvector)
#
# NOTE: keep image postgres:16-vectorchord... Do NOT downgrade to the official
# compose's postgres:14: the existing DB was initialized on 16 and cannot be
# read by a lower major version.
# ============================================================================

name: immich

services:
  immich-server:
    container_name: immich-server
    image: ghcr.io/immich-app/immich-server:release
    ports:
      - "2283:2283"
    volumes:
      - /mnt/nas/immich/library:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_HOSTNAME=database
      - DB_USERNAME=immich
      - DB_PASSWORD=1CrOovI+qVpA0oEgZRRYAhujNqPs+aP3d8rLrr2Vp5Q=
      - DB_DATABASE_NAME=immich
      - DB_PORT=5432
      - REDIS_HOSTNAME=redis
      - IMMICH_SECRET=d7f66c22bce49faf33fd5e42b7fee50f4c1008aec1d74aa6bd25a414b44e48bc
      - PUBLIC_SERVER_URL=https://photos.stephaneroos.com
      - DISABLE_MACHINE_LEARNING=true
      - TZ=Europe/Paris
    depends_on:
      - redis
      - database
    restart: always

  redis:
    container_name: immich-redis
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  database:
    container_name: immich-postgres
    image: ghcr.io/immich-app/postgres:16-vectorchord0.4.3-pgvectors0.3.0
    environment:
      - POSTGRES_PASSWORD=1CrOovI+qVpA0oEgZRRYAhujNqPs+aP3d8rLrr2Vp5Q=
      - POSTGRES_USER=immich
      - POSTGRES_DB=immich
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - /mnt/nas/immich/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U immich -d immich"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
